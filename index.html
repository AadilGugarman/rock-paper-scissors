<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        <div id="result"></div>
        <div class="choices">
        <div class="choice"><img src="rock.png" alt="rock"></div>
        <div class="choice"><img src="paper.png" alt="paper"></div>
        <div class="choice"><img src="scissors.png" alt="scissors"></div>
    </div>
    <div id="score">
        <div id="user-score">
            <P>0</P>
            <P>YOU</P>
        </div>
        <div id="computer-score">
            <P>0</P>
            <P>COMPUTER</P>
        </div>
    </div>
<div class="msg">
    <button><P>Make your choice</P></button>
</div>

</div>
</body>
</html>
